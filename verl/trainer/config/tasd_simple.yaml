defaults:
  - ppo_trainer
  - user
  - _self_

max_model_len: 18944

# ── 随机种子（可复现性）─────────────────────────────────────────────────
seed: 42

actor_rollout_ref:
  actor:
    ppo_mini_batch_size: 32
    entropy_coeff: 0.001        # DAPO: 保持探索
    # PPO clip ratio 配置（DAPO 风格：只 clip 下界，不 clip 上界）
    clip_ratio: 0.2
    clip_ratio_low: 0.2
    clip_ratio_high: 10000    # DAPO: 不 clip 上界（让好的 token 充分学习）
    policy_loss:
      loss_mode: tasd
    self_distillation:
      max_reprompt_len: 10240
      is_clip: 2.0
      # EMA teacher 配置
      teacher_regularization: "none"
      teacher_update_rate: 0.05
      include_environment_feedback: false
      success_reward_threshold: 1.0
    optim:
      lr: 1e-5
  rollout:
    n: 8
    calculate_log_probs: True
    repetition_penalty: 1.05

algorithm:
  adv_estimator: tasd
  norm_adv_by_std_in_grpo: False
  tasd:
    # ── 核心参数（清爽版）────────────────────────────────────
    reward_type: "teacher_prob"     # "teacher_prob" | "teacher_log_prob"
    
    # ── entropy gate: 熵门控，筛选有效训练信号 ──────────────────
    # none: 无门控
    # hard: 硬过滤，被过滤的 token reward=0 且不产生梯度（影响 mean/std）
    # hard_keep_reward: 硬过滤但保留 reward，只在 advantage 阶段过滤（不影响 mean/std）
    # soft: 软门控，按熵差加权 reward
    entropy_gate: "none"            # "none" | "hard" | "hard_keep_reward" | "soft"
    entropy_gate_ratio: 1.0         # hard gate 保留比例（默认 1.0 = 原始 hard gate）
                                    # 0.8 = 保留熵差 top 80%，0.5 = 保留 top 50%
                                    # 仅在 entropy_gate="hard" 时生效
    entropy_gate_tolerance: 0.0     # hard gate 豁免阈值（默认 0.0 = 等价于原 hard gate）
                                    # 0.1 = teacher 熵最多可比 student 高 0.1 仍保留（更宽松）
                                    # 仅在 entropy_gate="hard" 时生效
    
    # ── distill topk（熵门控需要）─────────────────────────────
    distill_topk: 100
    distill_temperature: 1.0
    
    # ── advantage clipping ────────────────────────────────────
    norm_adv_by_std: false          # 是否除以 group std（std 基于 effective token 统计，排除熵门控过滤的位置）
    adv_std_floor: 0.0              # std下界：0.0 | auto | float，防止 group_std 过小导致 adv 爆炸
    clip_adv: true
    clip_adv_value: 2.0
    # group_mean_mode: group mean/std 的统计粒度
    #   "token"：所有有效 token 打平统计（默认，原有方式，存在 length bias）
    #   "seq"  ：先 per-seq 取 token 均值估计 group mean/std，advantage 仍是 token 级
    #            adv[i,t] = (r[i,t] - group_mean_seq) / std_seq，消除 length bias
    group_mean_mode: "token"
    
    # ── advantage entropy weighting ──────────────────────────
    # 在 advantage 阶段按熵信息加权（不影响 group_mean）
    # 
    # 职责分离：
    #   - ENTROPY_GATE（reward 阶段）：控制哪些 token 参与训练（hard filter）
    #   - ADV_ENTROPY_WEIGHT（advantage 阶段）：对参与训练的 token 做软加权
    # 
    # adv_entropy_weight 只做加权，不过滤。过滤由 ENTROPY_GATE 通过 effective_mask 统一控制。
    # "none" | "teacher_conf" | "certainty_diff"
    adv_entropy_weight: "none"
    
    # ── entropy floor penalty：惩罚 student entropy 过低 ───────────
    # 原理：当 student 某个位置的归一化熵低于 floor 时，给予负向 reward
    # 阻止模型过度向确定性收敛，缓解 entropy collapse
    # entropy_floor=0.0 表示不启用（默认关闭）
    entropy_floor: 0.0              # 熵下界：0.0=不启用；低于此值的 token 被惩罚
    entropy_penalty_coeff: 0.0      # 惩罚强度，建议值：1.0 ~ 3.0

    # ── Level-1 teacher 可靠性绝对筛选 ──────────────────────
    # 两个绝对判据与 entropy_gate（相对判据）正交，重点解决 v7 teacher/student 同步崩塌：
    #   teacher_abs_entropy_gate: teacher 归一化熵上界，<该值 的 token 才算 teacher 可靠
    #     - 1.0 = 不启用（默认）
    #     - 0.3 = 激进：only teacher 非常确定的 token 可靠
    #     - 0.5 = 温和：teacher 中等确定即可靠（推荐起点）
    #   teacher_prob_floor: teacher 对 student 采样 y_t 的概率下界，>该值 才可靠
    #     - 0.0 = 不启用（默认）
    #     - 0.01 = 内部测试起点
    #     - 0.05 = 标准设置
    # 两者 AND；只要其中一个非默认，会自动开启 topk 统计。
    teacher_abs_entropy_gate: 1.0
    teacher_prob_floor: 0.0
    
    # ── 成功 rollout 配置 ─────────────────────────────────────
    include_successful_rollouts: true
    use_self_as_teacher_on_success: true
    success_reward_threshold: 1.0

    # ── v7: 错例池 + group-shared teacher context 配置 ─────────
    # teacher_context_mode:
    #   "per_rollout"  ：每个 rollout 各自拼 teacher prompt（legacy v4~v6）
    #   "group_shared" ：同一个 uid 的所有 rollout 共享一段 teacher prompt
    #                    = 问题 + 聚合错例池(去重) + 单条 reference answer
    #                    恢复 v5 group_mean 无偏；错例池由 bad rollout 聚合而来
    teacher_context_mode: "per_rollout"
    max_errors_in_pool: 8           # 每个 group 错例池中保留的去重后错例上限
    error_answer_max_chars: 1024    # 每条错例展示的答案字符上限（避免超长）
    # train_on_success:
    #   True  ：成功 rollout 仍参与 loss（legacy 行为）
    #   False ：成功 rollout mask=0，仅作为 reference answer 源，不计 loss
    #           用于隔离 "group shift" 与 "on-success teacher 伪蒸馏" 两种效应
    train_on_success: True
  # ── DAPO 动态采样（Dynamic Sampling / Group Filtering）──────────────
  # 过滤全对/全错的 group，只保留有区分度的 group 参与训练
  filter_groups:
    _target_: verl.trainer.config.FilterGroupsConfig
    enable: False             # 默认关闭，可通过 Nebula 覆盖
    metric: acc               # 用于判断是否全同：acc / seq_reward / seq_final_reward
    max_num_gen_batches: 0    # 0 = 不限制重采样次数

data:
  train_batch_size: 32
  gen_batch_size: ${data.train_batch_size}

trainer:
  val_before_train: False
  seed: ${seed}  # 引用顶层 seed，确保一致性
