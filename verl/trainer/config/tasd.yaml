defaults:
  - ppo_trainer
  - user
  - _self_

max_model_len: 18944

actor_rollout_ref:
  actor:
    ppo_mini_batch_size: 32
    policy_loss:
      loss_mode: vanilla        # 保持sdpo，复用teacher前向的计算
    self_distillation:
      max_reprompt_len: 10240
      is_clip: 2.0
      entropy_weighting: false
      entropy_temperature: 1.0
      entropy_weighting_version: "v4"
    optim:
      lr: 1e-5
  rollout:
    n: 8
    calculate_log_probs: True

algorithm:
  adv_estimator: tasd        # ← 从grpo改为tasd
  norm_adv_by_std_in_grpo: False
  tasd:
    # reward_type: log_ratio   # 候选B：log T(y_t) - log S(y_t)
    # reward_type: kl
    reward_type: jsd
  rollout_correction:
    rollout_is: token
    rollout_is_threshold: 2.0

data:
  train_batch_size: 32

trainer:
  val_before_train: False
